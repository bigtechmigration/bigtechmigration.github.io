<header class="site-header">
  <div class="container">
    <nav class="nav">
      <a href="{{ '/' | relative_url }}" class="logo">
        <img class="logo-mark" src="{{ '/assets/images/logo-mark.svg' | relative_url }}" width="40" height="24" alt="">
        {{ site.title }}
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}#services">Services</a></li>
        <li><a href="{{ '/' | relative_url }}#case-study">Case Study</a></li>
        <li><a href="{{ '/' | relative_url }}#support">Support</a></li>
        <li><a href="{{ '/about/' | relative_url }}">About</a></li>
        <li><a href="{{ '/contact/' | relative_url }}" class="btn btn-sm">Get in Touch</a></li>
      </ul>
    </nav>
  </div>
</header>

<script>
  document.querySelector('.nav-toggle').addEventListener('click', function() {
    document.querySelector('.nav-links').classList.toggle('open');
    this.classList.toggle('active');
  });
</script>
